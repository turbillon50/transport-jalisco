<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5"/>
<title>MT Empresarial · Logística de Confianza</title>
<meta name="description" content="Plataforma de operaciones de transporte empresarial: solicita traslados, gestiona servicios, flota y choferes."/>

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest"/>
<meta name="theme-color" content="#002863"/>
<meta name="color-scheme" content="light"/>
<link rel="icon" type="image/png" href="icons/icon-192.png"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MT Empresarial"/>

<!-- Tailwind + design tokens (Aero-Corporate Precision) -->

    darkMode: "class",
    theme: { extend: {
      colors: {
        "on-error-container":"#93000a","surface-container-lowest":"#ffffff","primary-fixed":"#d9e2ff",
        "on-error":"#ffffff","on-tertiary":"#ffffff","surface":"#f7f9fc","surface-variant":"#e0e3e6",
        "primary-container":"#003d8f","secondary-container":"#0070ea","secondary-fixed":"#d8e2ff",
        "on-primary-fixed":"#001944","secondary-fixed-dim":"#adc7ff","surface-bright":"#f7f9fc",
        "on-tertiary-fixed-variant":"#5c4200","tertiary-fixed":"#ffdea3","on-tertiary-fixed":"#261900",
        "on-secondary-fixed-variant":"#004493","on-primary-fixed-variant":"#0d4395","inverse-on-surface":"#eff1f4",
        "on-secondary-fixed":"#001a41","on-primary":"#ffffff","on-secondary":"#ffffff","surface-dim":"#d8dadd",
        "surface-container-low":"#f2f4f7","surface-tint":"#305bae","tertiary":"#3a2800",
        "surface-container":"#eceef1","inverse-surface":"#2d3133","outline":"#737783",
        "on-primary-container":"#88acff","tertiary-fixed-dim":"#f7bd3d","error-container":"#ffdad6",
        "surface-container-high":"#e6e8eb","inverse-primary":"#afc6ff","on-background":"#191c1e",
        "on-tertiary-container":"#dba523","on-surface":"#191c1e","on-surface-variant":"#434651",
        "background":"#f7f9fc","secondary":"#0059bb","surface-container-highest":"#e0e3e6",
        "primary":"#002863","error":"#ba1a1a","on-secondary-container":"#fefcff",
        "primary-fixed-dim":"#afc6ff","outline-variant":"#c3c6d3","tertiary-container":"#563d00"
      },
      borderRadius:{"DEFAULT":"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"0.75rem"},
      spacing:{"margin-mobile":"16px","gutter":"16px","md":"16px","margin-desktop":"48px","xs":"4px","xl":"32px","sm":"8px","lg":"24px","base":"4px"},
      fontFamily:{"display-lg":["Inter"],"label-md":["Inter"],"headline-sm":["Inter"],"body-lg":["Inter"],"label-lg":["Inter"],"headline-lg-mobile":["Inter"],"body-md":["Inter"],"headline-lg":["Inter"],"headline-md":["Inter"]},
      fontSize:{

        "label-md":["12px",{lineHeight:"16px",letterSpacing:"0.04em",fontWeight:"600"}],

<style>
  :root { --nav-w: 16rem; --bottom-nav-h: 76px; }
  * { -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0; background: #f7f9fc; color: #191c1e;
    font-family: Inter, system-ui, sans-serif;
    overscroll-behavior-y: none;
    -webkit-font-smoothing: antialiased;
  }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  /* App view: the injected screen lives here */
  #view { min-height: 100dvh; position: relative; }
  #view > .screen-root { min-height: 100dvh; }

  .screen-root { width: 100%; }

  /* Screen enter transition. Opacity-only so we never create a containing
     block that would displace the screens' own position:fixed action bars. */
  .screen-enter { animation: screenIn .3s ease both; }
  @keyframes screenIn { from { opacity: 0; } to { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) { .screen-enter { animation: none; } }

  /* ===== Navigation chrome ===== */
  #nav { display: none; z-index: 60; background: #ffffff; }
  body[data-chrome="tab"] #nav { display: flex; }

  /* Mobile: bottom tab bar */
  #nav {
    position: fixed; left: 0; right: 0; bottom: 0;
    flex-direction: row;
    border-top: 1px solid #c3c6d3;
    box-shadow: 0 -4px 24px rgba(0,40,99,.06);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  #nav .nav-brand { display: none; }
  #nav .nav-items { display: flex; flex: 1; flex-direction: row; justify-content: space-around; align-items: center; padding: 8px 4px; }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px; padding: 6px 2px; border-radius: 12px; color: #434651;
    background: transparent; border: 0; cursor: pointer; transition: all .18s ease; min-width: 0;
  }
  .nav-item .label { font-size: 11px; font-weight: 600; letter-spacing: .01em; }
  .nav-item.active { color: #002863; }
  .nav-item.active .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 500; }
  .nav-item .ico-wrap { position: relative; display: flex; align-items: center; justify-content: center;
    height: 30px; padding: 0 14px; border-radius: 999px; transition: background .18s ease; }
  .nav-item.active .ico-wrap { background: #d9e2ff; }
  .nav-item .badge { position: absolute; top: -1px; right: 6px; width: 8px; height: 8px; border-radius: 999px; background: #ba1a1a; border: 2px solid #fff; }

  body[data-chrome="tab"] #view { padding-bottom: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom, 0px)); }

  /* Desktop: left sidebar */
  @media (min-width: 768px) {
    #nav {
      top: 0; bottom: 0; right: auto; width: var(--nav-w);
      flex-direction: column; border-top: 0; border-right: 1px solid #c3c6d3;
      box-shadow: 0 0 40px rgba(0,40,99,.05); padding-bottom: 0;
    }
    #nav .nav-brand { display: block; padding: 24px 20px 12px; }
    #nav .nav-items { flex-direction: column; justify-content: flex-start; gap: 4px; padding: 8px 12px; align-items: stretch; }
    .nav-item { flex: none; flex-direction: row; justify-content: flex-start; gap: 14px; padding: 12px 14px; }
    .nav-item .ico-wrap { height: auto; padding: 0; }
    .nav-item.active .ico-wrap { background: transparent; }
    .nav-item.active { background: #d9e2ff; }
    .nav-item .label { font-size: 14px; }
    .nav-item .badge { right: -4px; top: -2px; }
    body[data-chrome="tab"] #view { padding-bottom: 0; margin-left: var(--nav-w); }
    /* Center the focused (no-nav) flows on large screens */
    body[data-chrome="detail"] #view > .screen-root,
    body[data-chrome="none"] #view > .screen-root { min-height: 100dvh; }
  }

  /* Top progress bar during route loads */
  #progress { position: fixed; top: 0; left: 0; height: 3px; width: 0; z-index: 100;
    background: linear-gradient(90deg,#0070ea,#f7bd3d); transition: width .3s ease, opacity .3s ease; opacity: 0; }
  #progress.active { opacity: 1; }

  /* Install banner (mobile) */
  #install-banner { position: fixed; left: 12px; right: 12px; bottom: calc(var(--bottom-nav-h) + 12px + env(safe-area-inset-bottom,0px));
    z-index: 70; background: #002863; color: #fff; border-radius: 14px; padding: 12px 14px;
    display: none; align-items: center; gap: 12px; box-shadow: 0 12px 32px rgba(0,40,99,.35); }
  #install-banner.show { display: flex; }
  @media (min-width: 768px) { #install-banner { left: auto; right: 20px; bottom: 20px; max-width: 320px; } }

  .nav-install { display: none; }
  @media (min-width: 768px) { .nav-install.show { display: block; } }
</style>
</head>
<body data-chrome="none">
  <div id="progress"></div>
  <main id="view" aria-live="polite"></main>

  <aside id="nav" aria-label="Navegación principal">
    <div class="nav-brand">
      <img src="icons/logo.png" alt="MT Empresarial · Tu destino, nuestra ruta" style="width:100%;max-width:188px;height:auto;display:block;"/>
      <div id="role-label" style="font-size:11px;color:#434651;text-transform:uppercase;letter-spacing:.12em;margin-top:10px;">Usuario</div>
      <button id="switch-role" style="margin-top:16px;width:100%;display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;border:1px solid #c3c6d3;background:#fff;color:#0059bb;font-weight:600;font-size:13px;cursor:pointer;">
        <span class="material-symbols-outlined" style="font-size:18px;">switch_account</span> Cambiar perfil
      </button>
      <button id="install-btn-side" class="nav-install" style="margin-top:8px;width:100%;display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;border:0;background:#002863;color:#fff;font-weight:600;font-size:13px;cursor:pointer;">
        <span class="material-symbols-outlined" style="font-size:18px;">install_mobile</span> Instalar app
      </button>
    </div>
    <div class="nav-items" id="nav-items"></div>
  </aside>

  <div id="install-banner">
    <span class="material-symbols-outlined" style="font-size:28px;color:#f7bd3d;">install_mobile</span>
    <div style="flex:1;">
      <div style="font-weight:700;font-size:14px;">Instala MT Empresarial</div>
      <div style="font-size:12px;opacity:.8;">Acceso directo, pantalla completa y uso sin conexión.</div>
    </div>
    <button id="install-btn" style="background:#f7bd3d;color:#261900;border:0;border-radius:10px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;">Instalar</button>
    <button id="install-dismiss" aria-label="Cerrar" style="background:transparent;border:0;color:#fff;cursor:pointer;display:flex;"><span class="material-symbols-outlined">close</span></button>
  </div>

  <script src="app.js"></script>
</body>
</html>
