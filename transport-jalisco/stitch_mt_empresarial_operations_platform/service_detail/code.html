<!-- Suppressed since this is a sub-page (Detail view) with "Back" button, but including a subtle desktop-only version to maintain shell if needed. 
         Following the suppression rule: Navigation shell is suppressed for focused Detail views. -->
<script>
        // Micro-interactions for button feedback
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.style.transform = 'scale(0.98)';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.transform = 'scale(1)';
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = 'scale(1)';
            });
        });

        // Simple Fade-in effect for the panel content
        window.addEventListener('DOMContentLoaded', () => {
            const sections = document.querySelectorAll('section');
            sections.forEach((section, index) => {
                section.style.opacity = '0';
                section.style.transform = 'translateY(10px)';
                section.style.transition = `all 0.5s ease-out ${index * 0.1}s`;
                setTimeout(() => {
                    section.style.opacity = '1';
                    section.style.transform = 'translateY(0)';
                }, 100);
            });
        });
    </script>
