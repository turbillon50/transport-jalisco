<body class="bg-background text-on-background min-h-screen flex flex-col items-center">
<!-- Hero/Header Section -->
<header class="w-full max-w-[1440px] px-margin-mobile md:px-margin-desktop pt-12 pb-8 flex flex-col items-center text-center">
<!-- Logo Brand -->
<div class="mb-12 flex flex-col items-center">
<div class="w-20 h-20 mb-4 bg-primary rounded-full flex items-center justify-center relative overflow-hidden">
<span class="material-symbols-outlined text-surface-container-lowest text-5xl" style="font-variation-settings: 'FILL' 1;">location_on</span>
<div class="absolute inset-0 bg-gradient-to-tr from-primary to-secondary opacity-30"></div>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary tracking-tight">
                MT Empresarial
            </h1>
<p class="text-on-surface-variant font-label-md text-label-md uppercase tracking-[0.2em] mt-1">Tu destino, nuestra ruta</p>
</div>
<!-- Titles -->
<div class="space-y-2">
<h2 class="font-headline-md text-headline-md text-on-background">Selecciona tu perfil</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-xs mx-auto">Elige cómo deseas continuar para personalizar tu experiencia.</p>
</div>
</header>
<!-- Main Content: Role Selection -->
<main class="w-full max-w-md px-margin-mobile pb-24 space-y-4">
<!-- Role Card: Usuario -->
<button class="role-card w-full flex items-center p-lg bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm hover:border-primary transition-all duration-200 group text-left">
<div class="flex-shrink-0 w-14 h-14 bg-primary-fixed rounded-full flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors duration-200">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<div class="ml-lg flex-grow">
<h3 class="font-label-lg text-label-lg text-on-background">Usuario</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Solicitar traslados programados</p>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary">chevron_right</span>
</button>
<!-- Role Card: Chofer -->
<button class="role-card w-full flex items-center p-lg bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm hover:border-primary transition-all duration-200 group text-left">
<div class="flex-shrink-0 w-14 h-14 bg-primary-fixed rounded-full flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors duration-200">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">directions_car</span>
</div>
<div class="ml-lg flex-grow">
<h3 class="font-label-lg text-label-lg text-on-background">Chofer</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Gestionar y realizar servicios asignados</p>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary">chevron_right</span>
</button>
<!-- Role Card: Invitado -->
<button class="role-card w-full flex items-center p-lg bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm hover:border-primary transition-all duration-200 group text-left">
<div class="flex-shrink-0 w-14 h-14 bg-surface-container-high rounded-full flex items-center justify-center text-on-surface-variant group-hover:bg-primary group-hover:text-on-primary transition-colors duration-200">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">visibility</span>
</div>
<div class="ml-lg flex-grow">
<h3 class="font-label-lg text-label-lg text-on-background">Invitado</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Explorar la plataforma sin registrarme</p>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary">chevron_right</span>
</button>
</main>
<!-- Visual Background Element (Atmospheric) -->
<div class="fixed bottom-0 left-0 w-full h-1/2 -z-10 overflow-hidden pointer-events-none opacity-40">
<div class="absolute bottom-[-10%] left-[-10%] w-[120%] h-full bg-gradient-to-t from-secondary-fixed-dim to-transparent rounded-full blur-3xl"></div>

</p>
<!-- Subtle Admin Access -->
<div class="mt-8 flex justify-center items-center gap-2 text-outline-variant hover:text-outline transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-sm">shield_person</span>
<span class="text-[10px] font-semibold uppercase tracking-widest">Acceso Administrativo</span>
</div>
</footer>
<!-- Role Selection Interaction Script -->
<script>
        document.querySelectorAll('.role-card').forEach(card => {
            card.addEventListener('click', function() {
                // Visual feedback of selection
                const iconContainer = this.querySelector('div');
                const title = this.querySelector('h3');
                
                // Temporary visual confirmation before logic
                this.classList.add('ring-2', 'ring-primary', 'ring-offset-2');
                
                // Simulation of navigation delay
                setTimeout(() => {
                    this.classList.remove('ring-2', 'ring-primary', 'ring-offset-2');
                    console.log('Role selected: ' + title.innerText);
                }, 150);
            });
        });
    </script>
