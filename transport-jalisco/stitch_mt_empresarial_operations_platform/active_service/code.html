<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

            word-wrap: normal;

            direction: ltr;
        }
        body {
            font-family: 'Inter', sans-serif;

        }

            background: linear-gradient(to bottom, rgba(247, 249, 252, 0.9) 0%, rgba(247, 249, 252, 0) 20%);

<style>

<body class="bg-background text-on-surface antialiased overflow-hidden">
<!-- Top Navigation Bar -->
<header class="bg-surface fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile md:px-margin-desktop h-16 border-b border-outline-variant">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-surface-container transition-colors rounded-full active:opacity-80 duration-150">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile md:text-headline-md text-primary font-bold">Servicio en curso</h1>
</div>
<div class="flex items-center gap-2 px-3 py-1 bg-tertiary-fixed text-on-tertiary-fixed rounded-full">
<span class="w-2 h-2 rounded-full bg-on-tertiary-fixed-variant animate-pulse"></span>
<span class="font-label-lg text-label-lg">En camino</span>
</div>
</header>
<!-- Main Content: Full Screen Map Simulation -->

<!-- Mock Route Line SVG Overlay -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" preserveaspectratio="none" viewbox="0 0 400 800">
<path class="drop-shadow-lg opacity-90" d="M 100 700 L 150 600 L 250 500 L 200 300 L 300 150" fill="none" stroke="#003D8F" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"></path>
<circle cx="100" cy="700" fill="#003D8F" r="8" stroke="white" stroke-width="2"></circle>
<circle cx="300" cy="150" fill="#FFC107" r="8" stroke="white" stroke-width="2"></circle>
</svg>
</div>
<!-- Floating UI Overlays -->
<div class="relative z-10 h-full flex flex-col justify-end p-margin-mobile md:p-margin-desktop">
<!-- Service Detail Card (Bento Style) -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-lg p-6 mb-4 w-full max-w-2xl mx-auto space-y-6">
<!-- Passenger Info -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-14 h-14 rounded-full bg-primary-fixed overflow-hidden flex items-center justify-center border-2 border-primary-container">
<img alt="Portrait of María González, a corporate professional. The photo is a high-quality studio headshot with soft, professional lighting and a neutral background. She wears business casual attire, conveying reliability and trust in a premium transit context. The colors are balanced and warm, fitting the modern corporate aesthetic." class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDAA-tcUyw1ErFMtxPldaFs57Ueevr7ler7Gos9-dMETKH4DiMNK2l_E21ehxO9duiomVGA-bbYEDaF3JujXMxp_pPCmkKruuHSTV_X4lcFJET7W96xuG3EZrk8dNajL2uPqCvKjbtxWHo3uZrMvTKD6lHrW8WXW4f4-nk1nKP1c5O_31yzq9RQ2aCPA2NG6077SMrGDujBobGkWpFImruapvIQLahqMcdqDmjvBKTPCcSDrW0kMON5T3Daczq0IB8fJCAVyj8SOig"/>
</div>
<div>
<p class="font-label-md text-label-md text-on-surface-variant">Pasajero</p>
<h2 class="font-headline-sm text-headline-sm text-on-surface">María González</h2>
</div>
</div>
<div class="flex gap-2">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-high text-primary hover:bg-primary-fixed transition-all active:scale-95">
<span class="material-symbols-outlined">call</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-high text-primary hover:bg-primary-fixed transition-all active:scale-95">
<span class="material-symbols-outlined">chat_bubble</span>
</button>
</div>
</div>
<!-- Route Details -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-4 border-t border-outline-variant">
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary"></span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Origen</span>
</div>
<p class="font-body-lg text-body-lg font-semibold pl-4">Aeropuerto GDL</p>
</div>
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-tertiary-fixed-dim"></span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Destino</span>
</div>
<p class="font-body-lg text-body-lg font-semibold pl-4">Hotel Riu Plaza</p>
</div>
</div>
<!-- Vehicle Info -->

<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline">directions_car</span>
<div>
<p class="font-label-md text-label-md text-on-surface-variant">Vehículo</p>
<p class="font-body-md text-body-md font-bold">Toyota Hiace 2023</p>
</div>
</div>
<div class="text-right">
<p class="font-label-md text-label-md text-on-surface-variant">Placas</p>
<p class="font-body-md text-body-md font-bold text-primary">JAL-12-AB</p>
</div>
</div>
</div>
<!-- Primary Action Bar (High Density Targets) -->
<div class="flex gap-4 w-full max-w-2xl mx-auto">
<button class="flex flex-col items-center justify-center gap-1 w-20 h-20 rounded-xl bg-surface-container-lowest border border-outline-variant text-primary shadow-sm hover:bg-primary-fixed transition-all active:scale-95">
<span class="material-symbols-outlined text-headline-md">location_on</span>
<span class="font-label-md text-[10px] uppercase">Llegué</span>
</button>
<button class="flex-1 h-20 flex items-center justify-center gap-3 rounded-xl bg-primary-container text-white font-bold text-headline-sm shadow-xl hover:bg-primary transition-all active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                    Iniciar servicio
                </button>
<button class="flex flex-col items-center justify-center gap-1 w-20 h-20 rounded-xl bg-error-container text-on-error-container shadow-sm hover:bg-error hover:text-white transition-all active:scale-95">

<span class="font-label-md text-[10px] uppercase">Alerta</span>
</button>
</div>
</div>
</main>
<!-- Bottom Navigation (Implicit Hidden on Active Task but defined for context) -->
<nav class="md:hidden fixed bottom-0 w-full z-50 flex justify-around items-center h-20 px-2 pb-2 bg-surface border-t border-outline-variant">

<span class="material-symbols-outlined">settings_suggest</span>
<span class="font-label-md text-label-md">Services</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">notifications</span>
<span class="font-label-md text-label-md">Alerts</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">directions_car</span>
<span class="font-label-md text-label-md">Fleet</span>
</div>
</nav>
<script>
        // Simple Interaction logic
        document.querySelector('.bg-primary-container').addEventListener('click', function() {
            this.innerHTML = `
                <span class="material-symbols-outlined animate-spin">sync</span>
                Actualizando...
            `;
            setTimeout(() => {
                this.innerHTML = `
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">stop</span>
                    Finalizar servicio
                `;
                this.classList.replace('bg-primary-container', 'bg-secondary-container');
            }, 1000);
        });
    </script>
</body></html>
