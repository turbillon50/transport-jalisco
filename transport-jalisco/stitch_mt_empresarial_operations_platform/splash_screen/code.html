<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MT Empresarial - Splash</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Animated Road Pattern Overlay */
        .road-pattern {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
            mask-image: linear-gradient(to bottom, transparent, black, transparent);
        }

        .animate-subtle-drift {
            animation: drift 20s linear infinite;
        }

        @keyframes drift {
            from { background-position: 0 0; }
            to { background-position: 40px 40px; }
        }

        .gradient-mesh {
            background: radial-gradient(circle at 20% 30%, #002863 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, #003d8f 0%, transparent 50%),
                        #001944;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#d9e2ff",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "surface": "#f7f9fc",
                        "surface-variant": "#e0e3e6",
                        "primary-container": "#003d8f",
                        "secondary-container": "#0070ea",
                        "secondary-fixed": "#d8e2ff",
                        "on-primary-fixed": "#001944",
                        "secondary-fixed-dim": "#adc7ff",
                        "surface-bright": "#f7f9fc",
                        "on-tertiary-fixed-variant": "#5c4200",
                        "tertiary-fixed": "#ffdea3",
                        "on-tertiary-fixed": "#261900",
                        "on-secondary-fixed-variant": "#004493",
                        "on-primary-fixed-variant": "#0d4395",
                        "inverse-on-surface": "#eff1f4",
                        "on-secondary-fixed": "#001a41",
                        "on-primary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#d8dadd",
                        "surface-container-low": "#f2f4f7",
                        "surface-tint": "#305bae",
                        "tertiary": "#3a2800",
                        "surface-container": "#eceef1",
                        "inverse-surface": "#2d3133",
                        "outline": "#737783",
                        "on-primary-container": "#88acff",
                        "tertiary-fixed-dim": "#f7bd3d",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#e6e8eb",
                        "inverse-primary": "#afc6ff",
                        "on-background": "#191c1e",
                        "on-tertiary-container": "#dba523",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#434651",
                        "background": "#f7f9fc",
                        "secondary": "#0059bb",
                        "surface-container-highest": "#e0e3e6",
                        "primary": "#002863",
                        "error": "#ba1a1a",
                        "on-secondary-container": "#fefcff",
                        "primary-fixed-dim": "#afc6ff",
                        "outline-variant": "#c3c6d3",
                        "tertiary-container": "#563d00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "gutter": "16px",
                        "md": "16px",
                        "margin-desktop": "48px",
                        "xs": "4px",
                        "xl": "32px",
                        "sm": "8px",
                        "lg": "24px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "display-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.04em", "fontWeight": "600" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Splash Screen Container -->
<main class="relative flex-grow flex flex-col items-center justify-center gradient-mesh w-full h-screen">
<!-- Animated Background Effects -->
<div class="absolute inset-0 road-pattern animate-subtle-drift pointer-events-none"></div>
<!-- Branding Content Wrapper -->
<div class="relative z-10 flex flex-col items-center px-margin-mobile md:px-margin-desktop text-center">
<!-- Logo Section -->
<div class="mb-lg animate-fade-in transition-all duration-1000 transform scale-95 md:scale-100">
<img alt="MT Empresarial Logo" class="w-48 md:w-64 drop-shadow-2xl brightness-110" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDCPxvxY-v7q_nM2y6GAbnNdKQAgKeny0TKsvnR8ZYMciHBsLSw6fiyIyZ7pGtDUPu7dzOwiUTPFPbM0wPqWQE-zaYR2I5VXz7dmifxAtAV0O3-kTXGxLnf7nmLxoZs0_P13qKQFjGBVKtuffthGdxWnZJ91hmNHzyXXc4OKJY6qVNF_Mi3eQTMqkjhji-xCGj6tSZJo4KEAMpJy8QEbF1VERoHEbVcRPHjC5gkz4ZptHfOUz8YVRyocnpE-ImTlXqTumM0XEdp1k4"/>
</div>
<!-- Brand Name & Identity (Simulated from Logo context) -->
<div class="mt-xs">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary-fixed mb-sm tracking-tight">
                    MT EMPRESARIAL
                </h1>
<p class="font-label-lg text-label-lg text-secondary-fixed opacity-90 tracking-widest uppercase">
                    TU DESTINO, NUESTRA RUTA
                </p>
</div>
<!-- Atmosphere Decorative Elements (Glassmorphism highlight) -->
<div class="mt-xl flex gap-xs">
<span class="w-2 h-2 rounded-full bg-primary-fixed"></span>
<span class="w-2 h-2 rounded-full bg-primary-fixed opacity-40"></span>
<span class="w-2 h-2 rounded-full bg-primary-fixed opacity-20"></span>
<span class="w-2 h-2 rounded-full bg-primary-fixed opacity-10"></span>
</div>
</div>
<!-- Call to Action -->
<div class="absolute bottom-12 w-full px-margin-mobile flex flex-col items-center">
<button class="w-full max-w-sm h-14 bg-secondary-container hover:bg-secondary transition-all duration-300 rounded-lg flex items-center justify-center gap-sm group shadow-lg active:scale-95" onclick="handleContinue()">
<span class="font-label-lg text-label-lg text-white">Continuar</span>
<span class="material-symbols-outlined text-white group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<p class="mt-md font-label-md text-label-md text-primary-fixed opacity-60">Versión 2.4.0 • Logística de Confianza</p>
</div>
</main>
<!-- Micro-interaction Scripts -->
<script>
        function handleContinue() {
            // Splash transition logic
            const main = document.querySelector('main');
            main.style.transition = 'opacity 0.6s ease-out, transform 0.6s ease-out';
            main.style.opacity = '0';
            main.style.transform = 'scale(1.05)';
            
            setTimeout(() => {
                alert('Iniciando sistema logístico MT Empresarial...');
                // Reset for demo purposes
                main.style.opacity = '1';
                main.style.transform = 'scale(1)';
            }, 700);
        }

        // Initialize entry animation
        document.addEventListener('DOMContentLoaded', () => {
            const logo = document.querySelector('.animate-fade-in');
            logo.classList.remove('scale-95', 'opacity-0');
            logo.classList.add('scale-100', 'opacity-100');
        });
    </script>
<style>
        .animate-fade-in {
            opacity: 0;
            transition: all 1s ease-out;
        }
    </style>
</body></html>
